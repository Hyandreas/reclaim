<svg xmlns="http://www.w3.org/2000/svg" width="900" height="560" viewBox="0 0 900 560" role="img" aria-labelledby="title desc">
  <title id="title">Highlighted SLA tier clause</title>
  <desc id="desc">A pre-rendered source image highlighting the 99.9 percent SLA credit tier.</desc>
  <rect width="900" height="560" fill="#fffaf0"/>
  <rect x="44" y="40" width="812" height="480" rx="10" fill="#ffffff" stroke="#d8d0c1" stroke-width="2"/>
  <text x="80" y="88" font-family="Georgia, serif" font-size="30" fill="#1f2422">Northstar Telecom MSA</text>
  <text x="80" y="120" font-family="Menlo, monospace" font-size="14" fill="#6a716d">Exhibit B - Service Level Credits - Page 14</text>
  <line x1="80" y1="145" x2="820" y2="145" stroke="#d8d0c1" stroke-width="2"/>
  <text x="80" y="188" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="18" fill="#1f2422">Monthly Availability Tiers</text>
  <rect x="78" y="213" width="744" height="92" rx="8" fill="#f7e3c2" stroke="#a96115" stroke-width="2"/>
  <text x="102" y="248" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="20" fill="#1f2422">If monthly availability falls below 99.9% and is at least 99.0%,</text>
  <text x="102" y="280" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="20" fill="#1f2422">customer receives a credit equal to 10% of the affected circuit MRC.</text>
  <text x="80" y="350" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="18" fill="#1f2422">Credit Cap</text>
  <text x="80" y="385" font-family="Avenir Next, Trebuchet MS, sans-serif" font-size="17" fill="#3d413f">Credits for any calendar month shall not exceed the monthly recurring charge for the affected circuit.</text>
  <text x="80" y="455" font-family="Menlo, monospace" font-size="13" fill="#6a716d">Citation id: sla-tier</text>
</svg>
